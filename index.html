<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGM Asset Management</title>
</head>
<body>

<!-- COOKIE BANNER -->
<div id="cookie-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#142618;color:white;padding:20px;z-index:9999">
  <p>Questo sito utilizza cookie tecnici necessari al funzionamento. 
  Leggi la <a href="/cookie.html" style="color:#b8976a">Cookie Policy</a>.</p>
  <button onclick="setCookie('rejected')">Rifiuta</button>
  <button onclick="setCookie('accepted')">Accetta</button>
</div>

<script>
function setCookie(val){
  const consent = {
    value: val,
    expiry: Date.now() + 31536000000
  };
  localStorage.setItem('cookie_consent', JSON.stringify(consent));
  document.getElementById('cookie-banner').style.display='none';
}

window.addEventListener('DOMContentLoaded',()=>{
  const consent = JSON.parse(localStorage.getItem('cookie_consent'));
  if(!consent || Date.now() > consent.expiry){
    document.getElementById('cookie-banner').style.display='block';
  }
});
</script>

</body>
</html>
